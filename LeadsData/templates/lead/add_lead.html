{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f8fafc;
    }

    .lead-card {
        border: none;
        border-radius: 22px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    .page-title {
        font-size: 30px;
        font-weight: 750;
        color: #0f172a;
        margin-bottom: 28px;
    }

    .form-label {
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
    }

    .form-control {
        height: 48px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        padding: 10px 14px;
        font-size: 15px;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }

    .form-section {
        margin-bottom: 18px;
    }

    .btn-custom {
        width: 150px;
        height: 45px;
        border-radius: 12px;
        font-weight: 600;
    }

    @media(max-width: 768px) {
        .lead-card {
            padding: 22px;
        }
    }
</style>

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-xl-9 col-lg-10 col-md-11">

            <div class="lead-card">

                <h3 class="text-center page-title">Add Lead</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 form-section">
                            <label class="form-label">Lead Name</label>
                            <input type="text"
                                   name="PersonName"
                                   class="form-control"
                                   placeholder="Enter lead name"
                                   required>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Mobile</label>
                            <input type="tel"
                                   name="ContactNo"
                                   class="form-control"
                                   placeholder="Enter 10-digit mobile number"
                                   pattern="[0-9]{10}"
                                   title="Please enter a valid 10-digit mobile number"
                                   required>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="Email"
                                   class="form-control"
                                   placeholder="Enter email address"
                                   pattern=".+@.+\.com"
                                   title="Please enter a valid .com email address"
                                   required>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Company</label>
                            <input type="text"
                                   name="CompanyName"
                                   class="form-control"
                                   placeholder="Enter company name">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Business Need</label>
                            <textarea name="BusinessNeed"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Enter business requirement"></textarea>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Gender</label>
                            <select name="Gender" class="form-control" required>
                                <option value="">--- select gender ---</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">City</label>
                            <input type="text"
                                   name="City"
                                   class="form-control"
                                   placeholder="Enter City"
                                   required>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">State</label>
                            <input type="text"
                                   name="State"
                                   class="form-control"
                                   placeholder="Enter State"
                                   required>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Product</label>
                            <select name="Product" class="form-control" required>
                                <option value="">--- select product ---</option>
                                {% for p in products %}
                                    <option value="{{ p.ProductID }}">{{ p.ProductName }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Region</label>
                            <select name="Region" class="form-control" required>
                                <option value="">--- select region ---</option>
                                {% for r in regions %}
                                    <option value="{{ r.RegionID }}">{{ r.RegionName }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Territory</label>
                            <select name="Territory" class="form-control" required>
                                <option value="">--- select territory ---</option>
                                {% for t in territories %}
                                    <option value="{{ t.TerritoryID }}">{{ t.TerritoryName }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Source</label>
                            <select name="Source" class="form-control" required>
                                <option value="">--- select source ---</option>
                                {% for s in sources %}
                                    <option value="{{ s.LeadSourceID }}">{{ s.LeadSourceName }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Status</label>
                            <select name="Status" class="form-control" required>
                                <option value="">--- select status ---</option>
                                {% for st in statuses %}
                                    <option value="{{ st.StatusID }}">{{ st.StatusName }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Date</label>
                            <input type="date"
                                   name="Lead_Gen_Date"
                                   class="form-control"
                                   value="{% now 'Y-m-d' %}"
                                   required>
                        </div>

                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <button type="submit"
                                class="btn btn-success btn-custom">
                            Save
                        </button>

                        <a href="{% url 'lead_list' %}"
                           class="btn btn-outline-secondary btn-custom">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
