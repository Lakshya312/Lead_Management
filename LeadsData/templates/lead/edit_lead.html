{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f8fafc;
    }

    .lead-card {
        border: none;
        border-radius: 22px;
        background: #ffffff;
        padding: 30px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    .page-title {
        font-size: 30px;
        font-weight: 750;
        color: #0f172a;
        margin-bottom: 30px;
    }

    .form-label {
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
    }

    .form-control {
        height: 48px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    textarea.form-control {
        height: 90px;
        resize: none;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }

    .form-section {
        margin-bottom: 20px;
    }

    .btn-custom {
        width: 150px;
        height: 45px;
        border-radius: 12px;
        font-weight: 600;
    }

    @media (max-width: 768px) {
        .lead-card {
            padding: 22px;
        }

        .btn-custom {
            width: 130px;
        }
    }
</style>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8 col-md-10">

            <div class="lead-card">

                <h3 class="text-center page-title">
                    Edit Lead
                </h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 form-section">
                            <label class="form-label">Lead Name</label>
                            <input type="text"
                                   name="PersonName"
                                   value="{{ lead.PersonName }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Mobile</label>
                            <input type="tel"
                                   name="ContactNo"
                                   value="{{ lead.ContactNo }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="Email"
                                   value="{{ lead.Email }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Company</label>
                            <input type="text"
                                   name="CompanyName"
                                   value="{{ lead.CompanyName }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Business Need</label>
                            <textarea name="BusinessNeed"
                                      class="form-control">{{ lead.BusinessNeed }}</textarea>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Gender</label>
                            <select name="Gender" class="form-control" required>
                                <option value="">--- select gender ---</option>
                                <option value="Male"
                                        {% if lead.Gender == "Male" %}selected{% endif %}>
                                        Male
                                </option>

                                <option value="Female"
                                        {% if lead.Gender == "Female" %}selected{% endif %}>
                                        Female
                                </option>

                                <option value="Other"
                                        {% if lead.Gender == "Other" %}selected{% endif %}>
                                        Other
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">City</label>
                            <input type="text"
                                   name="City"
                                   value="{{ lead.City }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">State</label>
                            <input type="text"
                                   name="State"
                                   value="{{ lead.State }}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Product</label>
                            <select name="Product" class="form-control" required>
                                <option value="">--- select product ---</option>
                                {% for p in products %}
                                <option value="{{ p.ProductID }}"
                                {% if lead.Product.ProductID == p.ProductID %}selected{% endif %}>
                                {{ p.ProductName }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Region</label>
                            <select name="Region" class="form-control" required>
                                <option value="">--- select region ---</option>
                                {% for r in regions %}
                                <option value="{{ r.RegionID }}"
                                {% if lead.Region.RegionID == r.RegionID %}selected{% endif %}>
                                {{ r.RegionName }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Territory</label>
                            <select name="Territory" class="form-control" required>
                                <option value="">--- select territory ---</option>
                                {% for t in territories %}
                                <option value="{{ t.TerritoryID }}"
                                {% if lead.Territory.TerritoryID == t.TerritoryID %}selected{% endif %}>
                                {{ t.TerritoryName }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Source</label>
                            <select name="Source" class="form-control" required>
                                <option value="">--- select source ---</option>
                                {% for s in sources %}
                                <option value="{{ s.LeadStatusID }}"
                                {% if lead.Source.LeadSourceID == s.LeadSourceID %}selected{% endif %}>
                                {{ s.LeadSourceName }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Status</label>
                            <select name="Status" class="form-control" required>
                                <option value="">--- select status ---</option>
                                {% for st in statuses %}
                                <option value="{{ p.StatusID }}"
                                {% if lead.Status.StatusID == p.StatusID %}selected{% endif %}>
                                {{ st.StatusName }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form-section">
                            <label class="form-label">Date</label>
                            <input type="date"
                                   name="Lead_Gen_Date"
                                   class="form-control"
                                   value="{% now 'Y-m-d' %}"
                                   required>
                        </div>

                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <button type="submit"
                                class="btn btn-success btn-custom">
                            Save
                        </button>

                        <a href="{% url 'lead_list' %}"
                           class="btn btn-outline-secondary btn-custom">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
