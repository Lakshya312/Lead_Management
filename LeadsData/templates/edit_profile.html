<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #eef2ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .edit-card {
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 55px rgba(15, 23, 42, 0.16);
        }

        .edit-header {
            background: linear-gradient(135deg, #071b33, #1e3a8a, #7c3aed);
            color: white;
            text-align: center;
            padding: 32px 25px;
        }

        .edit-header h2 {
            margin: 0;
            font-weight: 850;
            font-size: 32px;
        }

        .edit-header p {
            margin: 8px 0 0;
            opacity: 0.9;
        }

        .edit-body {
            padding: 34px;
        }

        .form-label {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .form-control {
            height: 48px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .button-row {
            display: flex;
            gap: 14px;
            margin-top: 26px;
        }

        .save-btn,
        .cancel-btn {
            flex: 1;
            border: none;
            border-radius: 13px;
            padding: 12px 16px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .save-btn {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
        }

        .cancel-btn {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .save-btn:hover,
        .cancel-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        @media(max-width: 600px) {
            .edit-card {
                margin: 16px;
            }

            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="edit-card">

    <div class="edit-header">
        <h2>Edit Profile</h2>
        <p>Update your account information</p>
    </div>

    <div class="edit-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-person-circle me-2"></i>
                    Username
                </label>
                <input type="text"
                       name="username"
                       value="{{ request.user.username }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-envelope-fill me-2"></i>
                    Email
                </label>
                <input type="email"
                       name="email"
                       value="{{ request.user.email }}"
                       class="form-control"
                       required>
            </div>

            <div class="button-row">
                <button type="submit" class="save-btn">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    Save Changes
                </button>

                <a href="{% url 'profile' %}" class="cancel-btn">
                    <i class="bi bi-x-circle-fill me-2"></i>
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
