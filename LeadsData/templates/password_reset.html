<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#071b33,#1e3a8a,#7c3aed);
            font-family:'Segoe UI',sans-serif;
        }

        .reset-card{
            width:100%;
            max-width:500px;
            background:white;
            border-radius:24px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
        }

        .icon-box{
            width:80px;
            height:80px;
            background:#eef2ff;
            color:#4f46e5;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:35px;
            margin:0 auto 20px;
        }

        .title{
            text-align:center;
            font-weight:800;
            color:#0f172a;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:14px;
            padding:12px;
        }

        .btn-reset{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            border:none;
            border-radius:14px;
            padding:12px;
            font-weight:700;
            width:100%;
        }

        .btn-reset:hover{
            opacity:0.95;
        }

        .back-link{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>

<body>

<div class="reset-card">

    <div class="icon-box">
        <i class="bi bi-shield-lock-fill"></i>
    </div>

    <h2 class="title">Forgot Password?</h2>

    <p class="subtitle">
        Enter your registered email address and we'll send you a password reset link.
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label fw-semibold">
                Email Address
            </label>

            {{ form.email }}
        </div>

        <button type="submit"
                class="btn btn-primary btn-reset">

            <i class="bi bi-envelope-fill me-2"></i>
            Send Reset Link

        </button>

    </form>

    <div class="back-link">
        <a href="{% url 'login' %}"
           class="text-decoration-none fw-semibold">

            ← Back to Login

        </a>
    </div>

</div>

</body>
</html>
