<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            min-height: 100vh;
        }

        .password-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .password-card {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            border-radius: 22px;
            padding: 34px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
            border: 1px solid #e2e8f0;
        }

        .page-title {
            font-size: 30px;
            font-weight: 750;
            color: #0f172a;
            text-align: center;
            margin-bottom: 28px;
        }

        form p {
            margin-bottom: 18px;
        }

        form label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            display: block;
        }

        form input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 10px 14px;
            font-size: 15px;
            outline: none;
        }

        form input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
        }

        .helptext {
            display: block;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 14px 18px;
            margin-top: 10px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .helptext ul {
            margin: 0;
            padding-left: 18px;
        }

        .btn-custom {
            height: 46px;
            border-radius: 12px;
            font-weight: 600;
        }

        @media(max-width: 576px) {
            .password-card {
                padding: 24px;
            }

            .button-area {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="password-page">

    <div class="password-card">

        <h2 class="page-title">
            Change Password
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="d-flex gap-3 mt-4 button-area">

                <button type="submit"
                        class="btn btn-success flex-fill btn-custom">
                    Update Password
                </button>

                <a href="{% url 'profile' %}"
                   class="btn btn-outline-secondary flex-fill btn-custom">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
