<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #071b33, #1e3a8a, #7c3aed);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            top: -120px;
            right: -120px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.10);
            border-radius: 50%;
            bottom: -100px;
            left: -90px;
        }

        .login-card {
            width: 430px;
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.28);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .card-header {
            background: white;
            border: none;
            text-align: center;
            padding: 35px 35px 15px;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 30px rgba(37,99,235,0.35);
        }

        .card-header h2 {
            font-weight: 850;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #64748b;
            margin-bottom: 0;
        }

        .card-body {
            padding: 28px 35px 35px;
        }

        .form-label {
            font-weight: 600;
            color: #0f172a;
        }

        .form-control {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
        }

        .input-group .form-control {
            border-radius: 12px 0 0 12px;
        }

        .input-group .btn {
            border-radius: 0 12px 12px 0;
        }

        .btn-login {
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 13px;
            width: 100%;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 12px 25px rgba(37,99,235,0.28);
        }

        .btn-login:hover {
            color: white;
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .register-link {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-block;
            margin-top: 12px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }

        .home-link:hover {
            color: #2563eb;
        }

        @media(max-width: 500px) {
            .login-card {
                width: 92%;
            }
        }
    </style>
</head>

<body>

<div class="card login-card">

    <div class="card-header">
        <div class="logo-box">
            <i class="bi bi-bar-chart-fill"></i>
        </div>

        <h2>Welcome Back</h2>
        <p>Login to Lead Management System</p>
    </div>

    <div class="card-body">

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter Username"
                           value="{{ username|default:'' }}"
                           required>
                </div>

                {% if username_error %}
                    <small class="text-danger">
                        {{ username_error }}
                    </small>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password"
                           name="password"
                           id="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required>

                    <button class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>

                {% if password_error %}
                    <small class="text-danger">
                        {{ password_error }}
                    </small>
                {% endif %}
            </div>

            <div class="form-check mt-3 mb-3">
                <input class="form-check-input"
                       type="checkbox"
                       name="remember_me"
                       id="remember_me">

                <label class="form-check-label" for="remember_me">
                    Keep me signed in
                </label>
            </div>

            <button type="submit" class="btn-login">
                Login
            </button>

            <div class="text-center mt-3">
                <a href="{% url 'password_reset' %}" class="text-decoration-none">
                    Forgot Password?
                </a>
            </div>

        </form>

        <hr class="my-4">

        <div class="text-center">
            <a href="{% url 'register' %}" class="register-link">
                Create New Account
            </a>

            <br>

            <a href="{% url 'home' %}" class="home-link">
                ← Back to Home
            </a>
        </div>

    </div>

</div>

<script>
function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("toggleIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.className = "bi bi-eye-slash";
    } else {
        password.type = "password";
        icon.className = "bi bi-eye";
    }
}
</script>

</body>
</html>
