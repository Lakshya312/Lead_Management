{% extends 'base.html' %}
{% block content %}

<style>
    body{
        background: #f8fafc;
    }

    .region-card{
        border: none;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.08);
        background: #fff;
    }

    .page-title{
        font-size: 30px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 30px;
    }

    .form-label{
        font-weight: 600;
        color: #334155;
    }

    .form-control{
        height: 50px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        padding: 12px 15px;
        font-size: 15px;
        transition: all 0.3s;
    }

    .form-control:focus{
        border-color: #2563eb;
        box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.15);
    }

    .btn-custom{
        width: 150px;
        height: 45px;
        border-radius: 12px;
        font-weight: 600;
    }
</style>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <div class="card region-card">

                <h2 class="text-center page-title">
                    Add Region
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label">
                            Region Name
                        </label>

                        <input list="regionList"
                               name="RegionName"
                               class="form-control"
                               placeholder="Enter Region Name"
                               required>

                        <datalist id="regionList">
                            {% for r in regions %}
                                <option value="{{ r.RegionName }}">
                            {% endfor %}
                        </datalist>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <button type="submit"
                                class="btn btn-success btn-custom">
                            Save
                        </button>

                        <a href="{% url 'region_list' %}"
                           class="btn btn-outline-secondary btn-custom">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
