{% extends 'base.html' %}
{% block content %}

<style>
    .page-wrapper {
        background: linear-gradient(135deg, #f8fafc, #eef2ff);
        min-height: 100vh;
        padding: 30px;
        border-radius: 20px;
    }

    .page-header {
        background: white;
        border-radius: 22px;
        padding: 25px 28px;
        box-shadow: 0 15px 40px rgba(15, 23, 42, 0.08);
        margin-bottom: 25px;
    }

    .page-title {
        font-size: 32px;
        font-weight: 850;
        color: #0f172a;
        margin: 0;
    }

    .page-subtitle {
        color: #64748b;
        margin: 5px 0 0;
    }

    .home-btn {
        border-radius: 12px;
        padding: 10px 18px;
        font-weight: 700;
    }

    .toolbar-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.07);
        margin-bottom: 25px;
    }

    .add-btn {
        background: linear-gradient(135deg, #059669, #10b981);
        border: none;
        color: white;
        padding: 12px 24px;
        border-radius: 14px;
        font-weight: 800;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
        box-shadow: 0 8px 22px rgba(16, 185, 129, 0.25);
    }

    .add-btn:hover {
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(16, 185, 129, 0.35);
    }

    .search-box {
        max-width: 440px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .search-box input {
        border-radius: 14px 0 0 14px;
        padding: 12px 15px;
        border: 1px solid #dbe3ef;
        border-right: none;
    }

    .search-box input:focus {
        border-color: #2563eb;
        box-shadow: none;
    }

    .search-btn {
        border-radius: 0 14px 14px 0;
        padding: 12px 24px;
        font-weight: 800;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        border: none;
        color: white;
    }

    .search-btn:hover {
        color: white;
        opacity: 0.95;
    }

    .table-card {
        background: white;
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.09);
        overflow-x: auto;
    }

    .custom-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 10px;
        margin: 0;
    }

    .custom-table thead th {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        padding: 17px;
        font-size: 15px;
        font-weight: 800;
        white-space: nowrap;
    }

    .custom-table thead th:first-child {
        border-radius: 16px 0 0 16px;
    }

    .custom-table thead th:last-child {
        border-radius: 0 16px 16px 0;
    }

    .custom-table tbody tr {
        background: #f8fafc;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        transition: 0.25s ease;
    }

    .custom-table tbody tr:hover {
        background: #eef2ff;
        transform: scale(1.005);
    }

    .custom-table td {
        padding: 15px 17px;
        vertical-align: middle;
        color: #0f172a;
        border: none;
        white-space: nowrap;
    }

    .region-badge {
        background: #e0f2fe;
        color: #075985;
        padding: 8px 16px;
        border-radius: 50px;
        font-weight: 800;
        font-size: 14px;
        display: inline-block;
    }

    .edit-btn,
    .delete-btn {
        border: none;
        border-radius: 11px;
        padding: 7px 14px;
        color: white;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        display: inline-block;
        transition: 0.25s;
    }

    .edit-btn {
        background: linear-gradient(135deg, #2563eb, #3b82f6);
    }

    .delete-btn {
        background: linear-gradient(135deg, #dc2626, #f43f5e);
        margin-left: 6px;
    }

    .edit-btn:hover,
    .delete-btn:hover {
        color: white;
        transform: translateY(-2px);
        opacity: 0.93;
    }

    @media(max-width: 768px) {
        .toolbar-card,
        .page-header {
            flex-direction: column;
            gap: 15px;
            align-items: stretch !important;
        }

        .search-box {
            max-width: 100%;
        }

        .home-btn,
        .add-btn {
            text-align: center;
        }
    }
</style>

<div class="page-wrapper">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3 class="page-title">Regions</h3>
            <p class="page-subtitle">Manage all business regions.</p>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary home-btn">
            Home
        </a>
    </div>

    <div class="toolbar-card d-flex justify-content-between align-items-center">

        <a href="{% url 'add_region' %}" class="add-btn">
            Add Region
        </a>

        <form method="GET">
            <div class="input-group search-box">
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Search Region..."
                       value="{{ request.GET.search }}">

                <button class="btn search-btn">
                    Search
                </button>
            </div>
        </form>

    </div>

    <div class="table-card">

        <table class="custom-table">
            <thead>
                <tr>
                    <th>Region Name</th>
                    <th style="width: 220px;">Action</th>
                </tr>
            </thead>

            <tbody>
                {% for r in regions %}
                <tr>
                    <td>
                        <span class="region-badge">
                            {{ r.RegionName }}
                        </span>
                    </td>

                    <td>
                        <a href="/regions/edit/{{ r.RegionID }}/"
                           class="edit-btn">
                            Edit
                        </a>

                        <a href="/regions/delete/{{ r.RegionID }}/"
                           class="delete-btn"
                           onclick="return confirm('Are you sure you want to delete this region?');">
                            Delete
                        </a>
                    </td>
                </tr>

                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted">
                        No regions found.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

{% endblock %}
