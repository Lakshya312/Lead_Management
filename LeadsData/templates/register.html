<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #071b33, #1e3a8a, #7c3aed);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            top: -120px;
            right: -120px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.10);
            border-radius: 50%;
            bottom: -100px;
            left: -90px;
        }

        .register-card {
            width: 450px;
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.28);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .card-header {
            background: white;
            border: none;
            text-align: center;
            padding: 35px 35px 15px;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 30px rgba(37,99,235,0.35);
        }

        .card-header h2 {
            font-weight: 850;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #64748b;
            margin-bottom: 0;
        }

        .card-body {
            padding: 28px 35px 35px;
        }

        .form-label {
            font-weight: 600;
            color: #0f172a;
        }

        .form-control {
            padding: 12px 14px;
            border-radius: 0;
            border: 1px solid #cbd5e1;
        }

        .input-group-text {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
        }

        .input-group-text:first-child {
            border-radius: 12px 0 0 12px;
        }

        .password-eye {
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            padding: 0 18px;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: none;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
            border-radius: 12px;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 13px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 12px 25px rgba(37,99,235,0.28);
        }

        .btn-register:hover {
            color: white;
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .login-link {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-block;
            margin-top: 12px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }

        .home-link:hover {
            color: #2563eb;
        }

        @media(max-width: 500px) {
            .register-card {
                width: 92%;
            }
        }

        .alert ul {
            margin-bottom: 0;
            padding-left: 20px;
        }

        .alert li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="card register-card">

    <div class="card-header">
        <div class="logo-box">
            <i class="bi bi-person-plus-fill"></i>
        </div>

        <h2>Create Account</h2>
        <p>Register for Lead Management System</p>
    </div>

    <div class="card-body">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info rounded-3">
                    {{ message|safe }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input type="text"
                           name="username"
                           class="form-control rounded-end"
                           placeholder="Enter Username"
                           required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </span>

                    <input type="email"
                           name="email"
                           class="form-control rounded-end"
                           placeholder="Enter Email"
                           required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required>

                    <span class="input-group-text password-eye"
                          onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-register">
                Create Account
            </button>

        </form>

        <hr class="my-4">

        <div class="text-center">
            Already have an account?
            <a href="{% url 'login' %}" class="login-link">
                Login Here
            </a>

            <br>

            <a href="{% url 'home' %}" class="home-link">
                ← Back to Home
            </a>
        </div>

    </div>

</div>

<script>
    function togglePassword() {
        let password = document.getElementById("password");
        let icon = document.getElementById("toggleIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
