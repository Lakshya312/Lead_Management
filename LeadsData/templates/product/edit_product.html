{% extends 'base.html' %}
{% block content %}

<style>
    .form-page {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #eef2ff);
        padding: 45px 20px;
        border-radius: 20px;
    }

    .form-card {
        max-width: 680px;
        margin: auto;
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 25px 70px rgba(15, 23, 42, 0.14);
        border: 1px solid #e2e8f0;
    }

    .form-header {
        background: linear-gradient(135deg, #071b33, #1e3a8a, #7c3aed);
        color: white;
        text-align: center;
        padding: 38px 25px;
    }

    .form-header h3 {
        font-weight: 850;
        margin: 0;
        font-size: 32px;
    }

    .form-header p {
        margin: 10px 0 0;
        opacity: 0.9;
    }

    .form-body {
        padding: 35px;
    }

    .form-group {
        margin-bottom: 22px;
    }

    .form-label {
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 8px;
    }

    .form-control {
        padding: 13px 15px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
    }

    .form-control:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }

    .update-btn,
    .cancel-btn {
        min-width: 150px;
        height: 52px;
        border-radius: 13px;
        font-weight: 700;
        padding: 0 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: 0.3s;
    }

    .update-btn {
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        border: none;
    }

    .update-btn:hover {
        color: white;
        transform: translateY(-2px);
        opacity: 0.95;
    }

    .cancel-btn {
        background: white;
        color: #64748b;
        border: 1px solid #64748b;
    }

    .cancel-btn:hover {
        background: #64748b;
        color: white;
        border-color: #64748b;
        transform: translateY(-2px);
    }

    @media(max-width: 600px) {
        .form-body {
            padding: 25px;
        }

        .button-area {
            flex-direction: column;
        }

        .update-btn,
        .cancel-btn {
            width: 100%;
        }
    }
</style>

<div class="form-page">

    <div class="form-card">

        <div class="form-header">
            <h3>Edit Product</h3>
            <p>Update product name and category details.</p>
        </div>

        <div class="form-body">

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Product</label>

                    <input type="text"
                           name="ProductName"
                           value="{{ product.ProductName }}"
                           class="form-control"
                           placeholder="Enter product name"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>

                    <select name="CategoryID" class="form-control" required>
                        {% for c in categories %}
                        <option value="{{ c.CategoryID }}"
                        {% if product.Category.CategoryID == c.CategoryID %}selected{% endif %}>
                            {{ c.CategoryName }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mt-4 d-flex justify-content-center gap-3 button-area">

                    <button type="submit" class="update-btn">
                        Update
                    </button>

                    <a href="{% url 'product_list' %}"
                       class="cancel-btn">
                       Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
