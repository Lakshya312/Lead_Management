{% extends 'base.html' %}

{% block content %}

<a href="{% url 'add_region' %}" class="btn btn-success mb-3">
    Add Region
</a>

<table class="table table-bordered table-striped">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    {% for region in regions %}
    <tr>

        <td>{{ region.regionid }}</td>
        <td>{{ region.regionname }}</td>

        <td>

            <a href="{% url 'edit_region' region.regionid %}"
               class="btn btn-warning btn-sm">
                Edit
            </a>

            <a href="{% url 'delete_region' region.regionid %}"
               class="btn btn-danger btn-sm">
                Delete
            </a>

        </td>

    </tr>
    {% endfor %}

</table>

{% endblock %}
