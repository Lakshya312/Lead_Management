{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Gateway | Authentication</title>
    <!-- Premium Fonts & Icons Pack -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <!-- Ambient Backdrop Glowing Blobs -->
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>

        <div class="login-card">
            <div class="login-header">
                <div class="brand-logo">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h2>SYSTEM GATEWAY</h2>
                <p>Provide authentication parameters to initialize session.</p>
            </div>

            <!-- Context Error Message Banner Layout -->
            {% if messages %}
                <div class="auth-errors-container">
                    {% for message in messages %}
                        <div class="error-pill">
                            <i class="bi bi-exclamation-triangle-fill"></i> {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}

                <!-- Username String Input Box Component -->
                <div class="floating-input-group">
                    <i class="bi bi-person-fill field-lead-icon"></i>
                    <input 
                        type="text" 
                        name="username" 
                        id="user-field-id"
                        required 
                        placeholder=" "
                        class="cyber-login-input"
                    >
                    <label for="user-field-id">Username</label>
                </div>

                <!-- Password Hash String Input Box Component -->
                <div class="floating-input-group">
                    <i class="bi bi-key-fill field-lead-icon"></i>
                    <input 
                        type="password" 
                        name="password" 
                        id="pass-field-id"
                        required 
                        placeholder=" "
                        class="cyber-login-input"
                    >
                    <label for="pass-field-id">Password</label>
                    <button type="button" id="password-toggle-trigger" class="field-action-toggle">
                        <i class="bi bi-eye-slash-fill" id="toggle-icon"></i>
                    </button>
                </div>

                <!-- Submission Operational Trigger Button -->
                <button type="submit" class="auth-submit-btn">
                    <span>Initialize Core Session</span> <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <p><i class="bi bi-info-circle"></i> Secure, encrypted connection pipeline trace active.</p>
            </div>
        </div>
    </div>

    <!-- Password Mask Switch Trigger JavaScript Engine Layer -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const passwordInput = document.getElementById('pass-field-id');
            const toggleButton = document.getElementById('password-toggle-trigger');
            const toggleIcon = document.getElementById('toggle-icon');

            if (toggleButton && passwordInput) {
                toggleButton.addEventListener('click', function() {
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        toggleIcon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
                    } else {
                        passwordInput.type = 'password';
                        toggleIcon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
                    }
                });
            }
        });
    </script>
</body>
</html>
